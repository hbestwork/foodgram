volumes:
  pg_data:
  static:
  media:

services:
  db:
    container_name: foodgram-db
    image: postgres:13
    env_file: ../.env
    volumes:
      - pg_data:/var/lib/postgresql/data 
  
  frontend:
    container_name: foodgram-front
    build: ../frontend    
    volumes:
      - static:/static
  
  backend:
    container_name: foodgram-back
    depends_on: 
      - db
    build: ../backend/
    env_file: ../.env    
    volumes:
      - static:/static
      - media:/media
        
  nginx:
    container_name: foodgram-proxy
    depends_on: 
      - db
      - backend
    build: ../nginx/
    ports:
      - "8000:80"
    volumes:      
      - ../docs/:/usr/share/nginx/html/api/docs/
      - static:/static
      - media:/media
